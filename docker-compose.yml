version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: bank_mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: bank_backend
    ports:
      - '5000:5000'
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/bank_management
      - JWT_SECRET=bank_jwt_secret_change_me
      - JWT_EXPIRES_IN=7d
      - PORT=5000
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongodb_data:
